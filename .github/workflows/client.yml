name: client

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  VITE_API_URL: http://localhost:8080

jobs:
  ci:
    name: Lint, build & test client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build:types

      - name: Run Lint
        run: pnpm exec eslint apps/client packages/contracts

      - name: Build client
        run: pnpm --filter @ys/client build

      - name: Run tests
        run: pnpm --filter @ys/client test
